name: Daily US Stocks Scanner

on:
  schedule:
    # Run at 22:00 UTC (after market close) Monday through Friday
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    # Allow manual triggering for testing and on-demand runs

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scan-and-build:
    runs-on: ubuntu-latest
    
    # We may need a longer timeout if there are many stocks and we are rate limited to 75/min
    # ~5000 stocks * (3 requests / stock) / 75 requests/min = 200 mins = ~3.5 hours
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner script
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          # SYMBOL_LIMIT: 10  # Uncomment to run a quick test with 10 symbols
        run: |
          python src/scanner.py

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: scan-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
